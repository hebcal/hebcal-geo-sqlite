# SonarCloud configuration.
#
# If this project uses Automatic Analysis, the project key and organization are
# bound in SonarCloud and don't need to be set here. If you run the scanner from
# CI instead, uncomment and fill these in:
sonar.projectKey=hebcal_hebcal-geo-sqlite
sonar.organization=hebcal

sonar.sources=src,bin
sonar.tests=test

# Suppress jssecurity:S8707 ("Agentic workflows should not be vulnerable to path
# injection attacks"). This package is a CLI / build tool whose purpose is to
# read and write SQLite database files at paths the operator deliberately
# supplies (e.g. build-geonames-sqlite, make-zips-sqlite, the GeoDb constructor).
# There is no untrusted input boundary here -- the caller is the trusted user --
# so constraining paths to an allowlist would break legitimate usage.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=jssecurity:S8707
sonar.issue.ignore.multicriteria.e1.resourcePath=src/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=jssecurity:S8707
sonar.issue.ignore.multicriteria.e2.resourcePath=bin/**/*
